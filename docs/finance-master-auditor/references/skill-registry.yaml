# Explicitly banned (must not reappear live)
banned_skills:
  - lhb-analyzer
  - yfinance-data
  - funda-data
  - twitter-reader
  - discord-reader
  - telegram-reader
  - linkedin-reader
  - tradingview-reader
  - opencli-reader
  - generative-ui
  - skill-creator
  - hyperliquid-reader
  - yc-reader

# Grok Web skill payload rules
grok_web:
  required:
    - YAML frontmatter on every SKILL.md (name, description, version)
    - Markdown-first content
  exclude_from_upload_optional:
    - evals/                 # local structural suite (contains .py)
    - finance-master-auditor # Hermes-only ops skill (sibling package)
  allowed_non_md:
    - LICENSE
    - VERSION
  forbidden_in_skill_tree:
    - "*.py"                 # except under evals/ if kept local
    - plugin.json
    - requirements.txt
    - personas/
    - scripts/               # inside L2 skills (product)

# Counts
counts:
  live_skill_md: 20
  l0: 1
  l1: 1
  l2: 18
