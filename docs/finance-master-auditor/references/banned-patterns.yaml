  - lhb-analyzer
  - yfinance-data
  - funda-data
  - twitter-reader
  - discord-reader
  - telegram-reader
  - linkedin-reader
  - tradingview-reader
  - opencli-reader
  - generative-ui
  - skill-creator
  - hyperliquid-reader
  - yc-reader

# Former quarantine buckets (reference only — directory deleted)
