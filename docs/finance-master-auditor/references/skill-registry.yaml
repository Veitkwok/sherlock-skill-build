# Conflict resolution rules
conflict_rules:
  - when: ["deep-analysis", "company-valuation"]
    resolve: "deep-analysis wins (superset)"
  - when: ["earnings-preview", "earnings-recap"]
    resolve: "earnings-preview wins, recap as supplement"
