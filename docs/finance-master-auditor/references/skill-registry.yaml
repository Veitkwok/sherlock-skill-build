# Skill Registry · finance-master product tree (v4.6.8+)
# Updated: 2026-07-12 · aligned to post-quarantine US monoculture layout
# Live SKILL.md count: 20 (excluding evals/ and finance-master-auditor)

version: "4.6.8"
product_ecosystem: "4.6.8"
auditor_version: "4.6.8"
auditor_role: monitor_and_notify_only
market_scope: US_EQUITIES_ONLY

# Paths relative to finance-master root (Hermes: ~/.hermes/skills/finance-master/)
layout:
  root: finance-master/
  entry: SKILL.md
  version_file: VERSION
  brain: sherlock-finance/
  discovery:
    - x-advanced-research/
    - serenity-skill/
  uzi: UZI-Skill/          # do not rename; Hermes GitHub watcher target
  finance_skills: finance-skills/  # do not rename; Hermes GitHub watcher target
  local_only:
    - evals/               # Python + fixtures; not required for Grok Web upload
  deleted:
    - _quarantine/         # removed 2026-07-12; bans live in banned-patterns.yaml

sources:
  finance-skills:
    repo: github.com/himself65/finance-skills
    branch: main
    local_path: finance-skills/
    hermes_target: "~/.hermes/skills/finance-master/finance-skills"
    note: "Internal layout frozen for watcher; product patches via PATCH strategy"
  UZI-Skill:
    repo: github.com/wbh604/UZI-Skill
    branch: main
    local_path: UZI-Skill/
    hermes_target: "~/.hermes/skills/finance-master/UZI-Skill"
    note: "Internal layout frozen; deep-analysis/investor-panel/trap-detector are NOTIFY (local rewrites). lhb-analyzer BANNED."
  serenity-skill:
    repo: github.com/muxuuu/serenity-skill
    branch: main
    local_path: serenity-skill/
    hermes_target: "~/.hermes/skills/finance-master/serenity-skill"
    note: "Internal layout frozen; NOTIFY on upstream (US-first product patches)"
  local:
    skills:
      - finance-master/SKILL.md
      - sherlock-finance
      - x-advanced-research
    note: no upstream auto-sync

# === LIVE SKILLS (20) ===
skills:
