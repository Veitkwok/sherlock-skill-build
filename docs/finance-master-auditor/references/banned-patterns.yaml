    - yfinance
    - "import yfinance"
    - "from yfinance"
    - "yf.Ticker"
    - "yf.screen"
    - longbridge
    - mcp_longbridge_
    - funda-data
    - funda.ai
    - akshare
    - opencli-reader
    - fetch_financials
    - fetch_kline
    - fetch_capital_flow
  china_microstructure:
    - lhb-analyzer
    - 龙虎榜
    - 游资席位
    - group-e-china-value
    - group-f-china-youzi
    - 涨停打板
  non_product_execution:
    - create_order_instruction
    - get_account_orders
    - get_account_positions
    - get_account_balances
    - get_account_trades
  script_era:
    - "scripts/"
    - run.py
    - requirements.txt
    - "personas/"
    - assemble_report
    - render_share
    - render_war
    - plugin.json

# Live deep-analysis must NOT reintroduce these reference files
