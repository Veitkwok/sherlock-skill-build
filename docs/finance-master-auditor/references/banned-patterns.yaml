# Banned / obsolete patterns extracted from former finance-master/_quarantine/
# Used by skill-watchdog.py and auditor LLM purification (v1.3+ / product 4.6.8+)
# Source: quarantine inventory (deleted 2026-07-12 from product tree)

version: 1
product_ecosystem: "4.6.8+"
market_scope: US_EQUITIES_ONLY

# Skills that must never remain in live finance-master
